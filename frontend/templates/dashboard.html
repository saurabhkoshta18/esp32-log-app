<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <nav>
            <ul>
                <li><a href="/download">Download Report</a></li>
                <li><a href="#" id="logout">Logout</a></li>
            </ul>
        </nav>
        <h2>Logs</h2>
        <table>
            <thead>
                <tr>
                    <th>UID</th>
                    <th>Action</th>
                    <th>Date</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="log-table">
                {% for log in logs %}
                <tr>
                    <td>{{ log.UID }}</td>
                    <td>{{ log.Action }}</td>
                    <td>{{ log.Date }}</td>
                    <td>{{ log.Time }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
